<div class="home-container">
  <img class="tela-cover" src="/920015_231899_1.webp" alt="telaraña" [class.hidden]="isHidden" />

  <section class="image-and-video-container">
    <img class="spiderman-eyes" src="/spiderman-eyes.png" alt="spiderman" />
    <div class="video-container">
      <iframe
        src="https://www.youtube.com/embed/o8EccyRIwQQ?autoplay=1&mute=1&loop=1&playlist=o8EccyRIwQQ&controls=0&modestbranding=1&fs=0"
        title="SPIDER-MAN: BRAND NEW DAY | Nuevo Tráiler oficial en español HD. 29 de julio en cines."
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
      >
      </iframe>
    </div>
  </section>
  @if(isHidden) {
  <app-cinema></app-cinema>
  }
</div>
